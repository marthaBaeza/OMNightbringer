<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNightbringer — Obey Me!</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Raleway', sans-serif;
    background: #0a0008;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(107,15,26,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 70% 80% at 80% 70%, rgba(45,10,46,0.7) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(30,5,35,0.4) 0%, transparent 80%),
      linear-gradient(135deg, #0a0008 0%, #1a041c 40%, #120008 70%, #0a0008 100%);
  }

  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.3; transform: scaleX(1); }
    50% { opacity: 0.8; transform: scaleX(1.02); }
  }

  @keyframes borderGlow {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes logoFlicker {
    0%, 100% { text-shadow: 0 0 20px rgba(155,48,255,0.6), 0 0 40px rgba(196,30,58,0.3); }
    50% { text-shadow: 0 0 30px rgba(155,48,255,0.9), 0 0 60px rgba(196,30,58,0.5), 0 0 80px rgba(155,48,255,0.2); }
  }

  .pentagrama {
    position: absolute;
    width: 600px;
    height: 600px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.04;
    animation: shimmer 8s ease-in-out infinite;
  }

  .main-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 1s ease forwards;
    width: 100%;
    max-width: 480px;
    padding: 0 1.5rem;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-title {
    font-family: 'Cinzel', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #f0e6ff;
    animation: logoFlicker 4s ease-in-out infinite;
    line-height: 1;
  }

  .logo-title span {
    color: #c41e3a;
  }

  .logo-sub {
    font-family: 'Raleway', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    color: #9b30ff;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #6b0f1a, #9b30ff, #6b0f1a, transparent);
    margin: 0.5rem 0 1.5rem;
    animation: borderGlow 3s ease-in-out infinite;
  }

  .card {
    width: 100%;
    background: rgba(15, 3, 18, 0.85);
    border: 1px solid rgba(155, 48, 255, 0.25);
    border-radius: 4px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    backdrop-filter: blur(12px);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 4px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(196,30,58,0.6), rgba(155,48,255,0.4), rgba(107,15,26,0.3), rgba(155,48,255,0.5));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderGlow 4s ease-in-out infinite;
  }

  .card-header {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #7a4a8a;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2rem;
  }

  .field {
    margin-bottom: 1.4rem;
  }

  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #9b30ff;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .field input {
    width: 100%;
    background: rgba(10, 0, 20, 0.7);
    border: 1px solid rgba(107, 15, 26, 0.5);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    color: #f0e6ff;
    font-family: 'Raleway', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  .field input::placeholder {
    color: rgba(155, 48, 255, 0.3);
    font-style: italic;
  }

  .field input:focus {
    border-color: rgba(155, 48, 255, 0.7);
    background: rgba(20, 0, 35, 0.8);
  }

  .forgot {
    text-align: right;
    margin-top: -0.8rem;
    margin-bottom: 1.4rem;
  }

  .forgot a {
    font-size: 0.72rem;
    color: #6b3080;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .forgot a:hover { color: #9b30ff; }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #6b0f1a 0%, #3d0a3e 50%, #6b0f1a 100%);
    border: 1px solid rgba(196, 30, 58, 0.5);
    border-radius: 2px;
    color: #f0e6ff;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-login::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(155,48,255,0.2), transparent);
    transition: left 0.5s;
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #8b1422 0%, #5a0f5a 50%, #8b1422 100%);
    border-color: rgba(155, 48, 255, 0.7);
    box-shadow: 0 0 20px rgba(155,48,255,0.2), 0 0 40px rgba(196,30,58,0.1);
  }

  .btn-login:hover::before { left: 100%; }

  .btn-login:active { transform: scale(0.98); }

  .card-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.2rem;
    border-top: 1px solid rgba(107,15,26,0.3);
  }

  .card-footer p {
    font-size: 0.72rem;
    color: #4a2550;
    letter-spacing: 0.05em;
  }

  .card-footer a {
    color: #9b30ff;
    text-decoration: none;
    transition: color 0.2s;
  }

  .card-footer a:hover { color: #c41e3a; }

  .page-footer {
    margin-top: 1.5rem;
    text-align: center;
  }

  .page-footer p {
    font-size: 0.62rem;
    color: #3a1a3a;
    letter-spacing: 0.15em;
    font-family: 'Cinzel', serif;
  }

  .error-msg {
    background: rgba(196,30,58,0.1);
    border: 1px solid rgba(196,30,58,0.3);
    border-radius: 2px;
    padding: 0.6rem 0.8rem;
    font-size: 0.75rem;
    color: #e06070;
    text-align: center;
    margin-bottom: 1rem;
    display: none;
    letter-spacing: 0.05em;
  }

  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,0,10,0.97);
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeUp 0.6s ease forwards;
  }

  .success-overlay.active { display: flex; }

  .success-title {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    color: #f0e6ff;
    letter-spacing: 0.2em;
    animation: logoFlicker 3s ease-in-out infinite;
    text-align: center;
    margin-bottom: 0.8rem;
  }

  .success-sub {
    font-size: 0.75rem;
    color: #9b30ff;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .redirect-bar {
    width: 200px;
    height: 2px;
    background: rgba(155,48,255,0.2);
    border-radius: 2px;
    overflow: hidden;
  }

  .redirect-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6b0f1a, #9b30ff);
    animation: fill 2s linear forwards;
    animation-delay: 0.3s;
  }

  @keyframes fill {
    to { width: 100%; }
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="particles" id="particles"></div>
  <svg class="pentagrama" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <polygon points="100,10 40,180 190,70 10,70 160,180" fill="none" stroke="#9b30ff" stroke-width="0.5"/>
    <circle cx="100" cy="100" r="95" fill="none" stroke="#6b0f1a" stroke-width="0.3"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#9b30ff" stroke-width="0.2"/>
  </svg>
</div>

<div class="main-wrap">
  <div class="logo-section">
    <div class="logo-title">OM<span>Nightbringer</span></div>
    <div class="logo-sub">Obey Me! — Portal Infernal</div>
  </div>
  <div class="divider"></div>

  <div class="card">
    <div class="card-header">Acceso al Reino Devildom</div>

    <div class="error-msg" id="errorMsg">
      Credenciales inválidas. El reino te rechaza.
    </div>

    <div class="field">
      <label for="username">Invocador</label>
      <input type="text" id="username" placeholder="Tu nombre en el pacto..." autocomplete="off">
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Sella tu contrato...">
    </div>

    <div class="forgot"><a href="#">¿Olvidaste el pacto?</a></div>

    <button class="btn-login" onclick="handleLogin()">Ingresar al Devildom</button>

    <div class="card-footer">
      <p>¿Primera vez en el Devildom? <a href="#">Forja tu pacto</a></p>
    </div>
  </div>

  <div class="page-footer">
    <p>OMNightbringer &copy; 2025 — Todos los demonios reservados</p>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-title">Bienvenido al Devildom</div>
  <div class="success-sub">Pacto verificado</div>
  <div class="redirect-bar"><div class="redirect-fill"></div></div>
</div>

<script>
const USUARIO_DEMO = "lucifer_mc";
const PASS_DEMO    = "RagnarokPact2025";

function handleLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('errorMsg');

  if (!u || !p) {
    err.textContent = "Los campos no pueden estar vacíos, invocador.";
    err.style.display = 'block';
    return;
  }

  /* ─────────────────────────────────────────────────────────────────
   * VULNERABILIDAD SQL INJECTION — sólo para fines didácticos
   * En un backend real con concatenación directa, la consulta sería:
   *
   *   SELECT * FROM usuarios
   *   WHERE usuario = '[valor de u]'
   *   AND contrasena = '[valor de p]';
   *
   * Si el atacante escribe en "usuario":  ' OR '1'='1
   * La consulta resultante sería:
   *   SELECT * FROM usuarios
   *   WHERE usuario = '' OR '1'='1'
   *   AND contrasena = 'abc';
   *
   * Como '1'='1' siempre es TRUE, la BD devuelve todos los registros
   * y el sistema concede acceso sin credenciales válidas.
   *
   * SOLUCIÓN (cómo reforzarlo):
   *   • Usar consultas parametrizadas / prepared statements
   *   • Nunca concatenar texto del usuario directamente en SQL
   *   • Ejemplo seguro en PHP:
   *       $stmt = $pdo->prepare(
   *         "SELECT * FROM usuarios WHERE usuario=? AND contrasena=?"
   *       );
   *       $stmt->execute([$usuario, $contrasena]);
   * ────────────────────────────────────────────────────────────────── */

  if (u === USUARIO_DEMO && p === PASS_DEMO) {
    err.style.display = 'none';
    document.getElementById('successOverlay').classList.add('active');
    setTimeout(() => {
      alert("Redirigiendo a la página principal del Devildom...");
    }, 2400);
  } else {
    err.textContent = "Credenciales inválidas. El reino te rechaza.";
    err.style.display = 'block';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

(function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = ['rgba(155,48,255,', 'rgba(196,30,58,', 'rgba(107,15,26,'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    const color = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${color}${Math.random()*0.6+0.2});
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(p);
  }
})();
</script>
</body>
</html>
