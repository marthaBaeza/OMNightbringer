<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNightbringer — Inicio de sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fondo difuminado -->
  <div class="backdrop" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Sigilo decorativo animado -->
  <div class="sigil-wrap" aria-hidden="true">
    <svg class="sigil" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <circle cx="200" cy="200" r="190" class="sigil-ring sigil-ring--outer"/>
      <circle cx="200" cy="200" r="150" class="sigil-ring sigil-ring--mid"/>
      <circle cx="200" cy="200" r="110" class="sigil-ring sigil-ring--inner"/>
      <polygon points="200,40 337,280 63,280" class="sigil-shape"/>
      <polygon points="200,360 63,120 337,120" class="sigil-shape sigil-shape--alt"/>
      <circle cx="200" cy="200" r="8" class="sigil-core"/>
    </svg>
  </div>

  <main class="stage">
    <section class="card" role="main" aria-labelledby="brand-title">

      <header class="card__header">
        <p class="eyebrow">Pacto de acceso</p>
        <h1 id="brand-title" class="brand">OM<span class="brand__accent">Nightbringer</span></h1>
        <p class="tagline">Solo quienes firman el pacto cruzan el umbral.</p>
      </header>

      <!-- ===================== LOGIN ===================== -->
      <form id="login-form" class="form" novalidate>
        <div class="field">
          <label for="login-user">Usuario</label>
          <input type="text" id="login-user" name="username" autocomplete="username" placeholder="Tu nombre de pacto" required>
        </div>

        <div class="field">
          <label for="login-pass">Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="login-pass" name="password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" class="toggle-pass" data-target="login-pass" aria-label="Mostrar contraseña">◎</button>
          </div>
        </div>

        <p class="form-message" id="login-message" role="alert" aria-live="polite"></p>

        <button type="submit" class="btn btn--primary">Firmar el pacto</button>

        <p class="switch-form">
          ¿Aún no tienes pacto?
          <button type="button" class="link-btn" id="go-register">Crea uno aquí</button>
        </p>
      </form>

      <!-- ===================== REGISTRO ===================== -->
      <form id="register-form" class="form form--hidden" novalidate>
        <div class="field">
          <label for="reg-user">Usuario</label>
          <input type="text" id="reg-user" name="username" autocomplete="username" placeholder="Elige un nombre" required minlength="3">
        </div>

        <div class="field">
          <label for="reg-pass">Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="reg-pass" name="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
            <button type="button" class="toggle-pass" data-target="reg-pass" aria-label="Mostrar contraseña">◎</button>
          </div>
        </div>

        <div class="field">
          <label for="reg-pass2">Confirmar contraseña</label>
          <div class="password-wrap">
            <input type="password" id="reg-pass2" name="password2" autocomplete="new-password" placeholder="Repite tu contraseña" required minlength="6">
            <button type="button" class="toggle-pass" data-target="reg-pass2" aria-label="Mostrar contraseña">◎</button>
          </div>
        </div>

        <p class="form-message" id="register-message" role="alert" aria-live="polite"></p>

        <button type="submit" class="btn btn--primary">Sellar el pacto</button>

        <p class="switch-form">
          ¿Ya tienes un pacto?
          <button type="button" class="link-btn" id="go-login">Inicia sesión</button>
        </p>
      </form>

    </section>

    <p class="footnote">OMNightbringer · un proyecto inspirado en <em>Obey Me!</em> con fines no comerciales</p>
  </main>

<script src="auth.js"></script>
</body>
</html>
